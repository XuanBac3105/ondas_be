# ══════════════════════════════════════════════════════════
#  docker-compose.dev.yml  — Local Development
#
#  Chỉ khởi động PostgreSQL, mở port ra ngoài để
#  IDE / DBeaver / TablePlus kết nối trực tiếp.
#
#  Spring Boot chạy trực tiếp trên máy (không qua Docker):
#    ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#    hoặc set SPRING_PROFILES_ACTIVE=dev trong IntelliJ Run Config
#
#  Cách dùng:
#    docker compose -f docker-compose.dev.yml up -d
# ══════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    container_name: ondas-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ondas_db
      POSTGRES_USER:     ondas_user
      POSTGRES_PASSWORD: ondas_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ondas-minio-dev
    restart: unless-stopped
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console UI
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  minio_dev_data:
