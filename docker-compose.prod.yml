# ══════════════════════════════════════════════════════════
#  docker-compose.prod.yml  — Production / VPS
#
#  Cách dùng (Jenkins deploy):
#    docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# ══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ondas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ondas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Spring Boot Backend ─────────────────────────────────
  ondas-be:
    image: dinhtrieuxtnd/ondas-be:latest
    container_name: ondas-be
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE:     prod
      JWT_SECRET:                 ${JWT_SECRET}
      JWT_EXPIRATION:             ${JWT_EXPIRATION}
      JAVA_OPTS:                  -Xmx256m -Xms128m
      MINIO_ENDPOINT:             http://minio:9000
      MINIO_ACCESS_KEY:           ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:           ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_AUDIO:         ${MINIO_BUCKET_AUDIO}
      MINIO_BUCKET_IMAGE:         ${MINIO_BUCKET_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ondas-network

  # ── MinIO ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ondas-minio
    restart: unless-stopped
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console UI
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ondas-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ── Volumes & Networks ────────────────────────────────────
volumes:
  postgres_data:
  minio_data:

networks:
  ondas-network:
    driver: bridge
